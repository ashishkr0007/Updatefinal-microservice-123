spring.application.name=api-gateway
server.port=8090
 
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
 
# User Service Routes
spring.cloud.gateway.routes[0].id=user-service-auth
spring.cloud.gateway.routes[0].uri=lb://user-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**
 
spring.cloud.gateway.routes[1].id=user-service
spring.cloud.gateway.routes[1].uri=lb://user-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/users/**
#spring.cloud.gateway.routes[1].filters[0]=JwtAuthenticationFilter
 
# Account Service Routes
spring.cloud.gateway.routes[2].id=account-service
spring.cloud.gateway.routes[2].uri=lb://account-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/accounts/**
#spring.cloud.gateway.routes[2].filters[0]=JwtAuthenticationFilter
 
# Transaction Service Routes
spring.cloud.gateway.routes[3].id=transaction-service
spring.cloud.gateway.routes[3].uri=lb://transaction-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/transactions/**
#spring.cloud.gateway.routes[3].filters[0]=JwtAuthenticationFilter
 
# Analytics Service Routes
spring.cloud.gateway.routes[4].id=analytics-service
spring.cloud.gateway.routes[4].uri=lb://analytics-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/analytics/**
#spring.cloud.gateway.routes[5].filters[0]=JwtAuthenticationFilter
 
# Notification Service Routes
spring.cloud.gateway.routes[5].id=notification-service
spring.cloud.gateway.routes[5].uri=lb://notification-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/notifications/**
#spring.cloud.gateway.routes[4].filters[0]=JwtAuthenticationFilter
 

 
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true